# general settings
name: Restormer_LOLv2_128_16_cos_25k_HalfLR
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: TrainSet_LOLv2
    type: Dataset_PairedImage
    dataroot_gt: ./datasets/LOL-v2/Real_captured/Train/Normal
    dataroot_lq: ./datasets/LOL-v2/Real_captured/Train/Low
    geometric_augs: true

    filename_tmpl: "{}"
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 12
    batch_size_per_gpu: 16

    ### ------- Training on fixed-patch size 128x128 for Comparison ---------
    iters: [25000]
    mini_batch_sizes: [16]
    gt_size: 128
    gt_sizes: [128]
    ### ---------------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~
    pin_memory: true
    prefetch_factor: 2
    persistent_workers: true

  val:
    name: ValSet_LOLv2
    type: Dataset_PairedImage
    dataroot_gt: ./datasets/LOL-v2/Real_captured/Test/Normal
    dataroot_lq: ./datasets/LOL-v2/Real_captured/Test/Low
    io_backend:
      type: disk

# network structures
network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False
  use_checkpoint: True

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 25000
  warmup_iter: 1000
  use_grad_clip: true

  accumulation_steps: 1
  mini_accumulation_steps: [1]

  optim_g:
    type: AdamW
    lr: !!float 1.5e-4 # 学习率减半
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  # 余弦退火调度器
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [25000]
    restart_weights: [1]
    eta_mins: [0.0000025] # 最低学习率也同步减半

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: !!float 1e3
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 16

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: Restormer_LOLv2
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
