name: Batch_test
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: TrainSet_LOLv2
    type: Dataset_PairedImage
    dataroot_gt: ./datasets/LOL-v2/Real_captured/Train/Normal
    dataroot_lq: ./datasets/LOL-v2/Real_captured/Train/Low
    geometric_augs: true
    filename_tmpl: "{}"
    io_backend:
      type: disk

    # 数据读取
    use_shuffle: true
    num_worker_per_gpu: 4 # 测试时可以设小一点，减少干扰
    batch_size_per_gpu: 48 # 匹配 mini_batch_sizes 的最大值，防止溢出

    # --- 高效率阶段性能测试方案 (方案 A：速度优先) ---
    # 根据 24G 显存实测: [21.1G, 21.8G, 20G, 21G, 22G, 16.2G]
    mini_batch_sizes: [48, 32, 20, 12, 8, 4]
    # 显存占用  [21.1G,21.8G,20G,21G,22G,16.2G]

    # 快速跳转测试：每个阶段只跑 20 步，总共 120 步即可测试完所有分辨率
    iters: [20, 20, 20, 20, 20, 20]
    gt_size: 384
    gt_sizes: [128, 160, 192, 256, 320, 384]

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val: # 验证集保持默认
    name: ValSet_LOLv2
    type: Dataset_PairedImage
    dataroot_gt: ./datasets/LOL-v2/Real_captured/Test/Normal
    dataroot_lq: ./datasets/LOL-v2/Real_captured/Test/Low
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  use_checkpoint: True # <--- 核心：开启梯度检查点

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 120
  warmup_iter: -1
  use_grad_clip: true

  # 补全缺失配置
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  # 针对单卡 4090 优化 (方案 A：平衡速度与质量)
  # 目标等效总 Batch Size: [48, 32, 40, 36, 32, 32]
  mini_accumulation_steps: [1, 1, 2, 3, 4, 8]

  # 默认保底值
  accumulation_steps: 1

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [120]
    restart_weights: [1]
    eta_mins: [0.0003]

  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 8
  val_freq: 100 # 测试期间减少验证干扰
  save_img: false
  rgb2bgr: true
  use_image: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0 # 补全缺失的 PSNR 参数
      test_y_channel: false # 补全缺失的 PSNR 参数

logger:
  print_freq: 1 # 每一步都打印，方便观察 Accum_Steps 的更新
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: Restormer_LOLv2
    resume_id: ~

# 分布式设置
dist_params:
  backend: nccl
  port: 29500
